; ============================================================
;  BlackLock 配置文件  (UTF-8)
;  改完保存即时生效 (热重载: 密码 / 快捷键 / 开机自启 / 是否需要密码)
; ============================================================

[general]
; 触发黑屏锁的全局快捷键。修饰键: Alt / Ctrl / Shift / Win, 用 + 连接。
;   例如: Alt+L   Ctrl+Alt+L
hotkey = Alt+L

; 是否开机自启。true = 写入注册表启动项; false = 移除。
autostart = false

[security]
; 是否需要密码解锁。也可在托盘菜单勾选"开启密码"切换。
;   false = 简单锁屏: 按回车, 或再次按解锁快捷键, 即可解锁 (无需密码)
;   true  = 需输入下面的 password + 回车 才能解锁
require_password = false

; 解锁密码 (明文)。仅当 require_password = true 时生效。
;
; 【字符限制】只能用英文字母 (a-z A-Z) 和数字 (0-9), 区分大小写。
;   不支持中文、输入法、emoji、空格及标点符号 —— 锁屏时是逐个按键翻译收集密码的,
;   这些字符在那条路径上无法可靠输入, 设了会导致永远解不开锁。
;   若密码为空或含非法字符, 程序会拒绝启用密码保护, 并弹托盘气泡提示。
;
; 注意: 明文存储, 能读到本文件的人即可看到密码, 仅作临时遮挡用途。
password =

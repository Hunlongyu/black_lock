; ============================================================
;  BlackLock 配置文件  (UTF-8)
;  改完保存即时生效 (热重载: 密码 / 快捷键 / 开机自启)
; ============================================================

[general]
; 触发黑屏锁的全局快捷键。修饰键: Alt / Ctrl / Shift / Win, 用 + 连接。
;   例如: Alt+L   Ctrl+Alt+L
hotkey = Alt+L

; 是否开机自启。true = 写入注册表启动项; false = 移除。
autostart = false

[security]
; 解锁密码 (明文)。改完保存即时生效。默认 ciqtek。
; 注意: 明文存储, 能读到本文件的人即可看到密码, 仅作临时遮挡用途。
password = ciqtek

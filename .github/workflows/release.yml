name: Release

# 推送形如 v1.0.0 的标签时: 编译 x64 与 x86 两个 Release 版, 上传到对应的 GitHub Release。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 允许创建 Release / 上传附件

jobs:
  build:
    runs-on: windows-latest # 自带 CMake 与 Visual Studio (MSVC)
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            label: win64
          - arch: x86
            cmake_arch: Win32
            label: win32
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT" # v1.2.3 -> 1.2.3

      - name: Configure (MSVC ${{ matrix.arch }}, 版本号取自标签)
        run: cmake -S . -B build -A ${{ matrix.cmake_arch }} -DBL_VERSION_OVERRIDE=${{ steps.ver.outputs.version }}

      - name: Build (MinSizeRel)
        run: cmake --build build --config MinSizeRel

      - name: Package (${{ matrix.arch }})
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Force out | Out-Null
          Copy-Item dist/BlackLock.exe "out/BlackLock-${{ matrix.arch }}.exe"
          Compress-Archive -Path dist/BlackLock.exe, dist/config.ini `
            -DestinationPath "out/BlackLock-v$ver-${{ matrix.label }}.zip" -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blacklock-${{ matrix.arch }}
          path: out/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts # 各架构落到 artifacts/blacklock-<arch>/

      - name: Build release notes (含下载角标)
        shell: bash
        env:
          BASE: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo '## 下载'
            echo
            echo '| 架构 | 直接下载 | 适用系统 |'
            echo '|:---:|:---:|:---|'
            echo "| **x64** | [![x64](https://img.shields.io/badge/⬇_BlackLock--x64.exe-2C7BE5?style=for-the-badge&logo=windows)](${BASE}/BlackLock-x64.exe) | 64 位 Windows 10/11（推荐） |"
            echo "| **x86** | [![x86](https://img.shields.io/badge/⬇_BlackLock--x86.exe-6C757D?style=for-the-badge&logo=windows)](${BASE}/BlackLock-x86.exe) | 32 位 Windows |"
            echo
            echo '单文件 exe，下载即用（默认快捷键 `Alt + L`，默认密码 `ciqtek`）。含默认配置的压缩包见下方 **Assets**。'
            echo
            echo '## 更新内容'
            echo
            echo "详见 [CHANGELOG.md](https://github.com/${REPO}/blob/main/CHANGELOG.md)。"
          } > NOTES.md
          cat NOTES.md

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # 若 Release 已存在则改为更新说明并上传/覆盖附件
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "BlackLock $GITHUB_REF_NAME" --notes-file NOTES.md \
            artifacts/*/* \
          || { gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file NOTES.md; \
               gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" artifacts/*/* --clobber; }

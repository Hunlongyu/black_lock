name: Release

# 推送形如 v1.0.0 的标签时: 编译 x64 与 x86 两个 Release 版, 上传到对应的 GitHub Release。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 允许创建 Release / 上传附件

jobs:
  build:
    runs-on: windows-latest # 自带 CMake 与 Visual Studio (MSVC)
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            label: win64
          - arch: x86
            cmake_arch: Win32
            label: win32
          - arch: arm64
            cmake_arch: ARM64
            label: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT" # v1.2.3 -> 1.2.3

      - name: Configure (MSVC ${{ matrix.arch }}, 版本号取自标签)
        run: cmake -S . -B build -A ${{ matrix.cmake_arch }} -DBL_VERSION_OVERRIDE=${{ steps.ver.outputs.version }}

      - name: Build (MinSizeRel)
        run: cmake --build build --config MinSizeRel

      - name: Test (ctest)
        # 测试不过就不发版; ARM64 产物无法在 x64 runner 执行, 只做编译校验
        if: matrix.arch != 'arm64'
        run: ctest --test-dir build -C MinSizeRel --output-on-failure

      - name: Verify runtime deps (零依赖)
        shell: pwsh
        # 静态 CRT 的底线: 产物不得依赖 VC++ 运行库, 否则干净系统起不来
        run: |
          $dumpbin = (Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio" -Recurse -Filter dumpbin.exe -EA SilentlyContinue |
                      Where-Object { $_.FullName -match 'Hostx64\\x64' } | Select-Object -First 1).FullName
          $deps = & $dumpbin /dependents "dist/${{ matrix.arch }}/BlackLock.exe"
          $bad = $deps | Select-String -Pattern 'VCRUNTIME|api-ms-win-crt'
          if ($bad) { $bad; throw "产物仍依赖 VC++ 运行库, 违反零依赖约定" }
          Write-Host "零运行时依赖 OK"

      - name: Verify PE architecture (${{ matrix.arch }})
        shell: pwsh
        # 防止发错架构: 校验 PE Machine 字段与本矩阵分支一致
        run: |
          $exe = "dist/${{ matrix.arch }}/BlackLock.exe"
          $b = [IO.File]::ReadAllBytes($exe)
          $m = [BitConverter]::ToUInt16($b, [BitConverter]::ToInt32($b, 0x3C) + 4)
          $want = switch ("${{ matrix.arch }}") { "x64" { 0x8664 } "x86" { 0x14C } "arm64" { 0xAA64 } }
          if ($m -ne $want) { throw "架构不符: 期望 0x$($want.ToString('X4')), 实际 0x$($m.ToString('X4'))" }
          Write-Host "PE Machine 0x$($m.ToString('X4')) OK"

      - name: Package (${{ matrix.arch }})
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $d = "dist/${{ matrix.arch }}"
          New-Item -ItemType Directory -Force out | Out-Null
          Copy-Item "$d/BlackLock.exe" "out/BlackLock-${{ matrix.arch }}.exe"
          Compress-Archive -Path "$d/BlackLock.exe", "$d/config.ini" `
            -DestinationPath "out/BlackLock-v$ver-${{ matrix.label }}.zip" -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: blacklock-${{ matrix.arch }}
          path: out/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts # 各架构落到 artifacts/blacklock-<arch>/

      - name: Build release notes (含下载角标)
        shell: bash
        env:
          BASE: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          {
            echo '## 下载'
            echo
            echo '| 架构 | 下载 | 适用系统 |'
            echo '|:---:|:---|:---|'
            echo "| **x64** | [![exe x64](https://img.shields.io/badge/exe-x64-0078D6?style=flat-square&logo=windows&logoColor=white)](${BASE}/BlackLock-x64.exe) [![zip x64](https://img.shields.io/badge/zip-x64-0078D6?style=flat-square&logo=windows&logoColor=white)](${BASE}/BlackLock-v${VER}-win64.zip) | 64 位 Windows 10/11（推荐） |"
            echo "| **x86** | [![exe x86](https://img.shields.io/badge/exe-x86-0078D6?style=flat-square&logo=windows&logoColor=white)](${BASE}/BlackLock-x86.exe) [![zip x86](https://img.shields.io/badge/zip-x86-0078D6?style=flat-square&logo=windows&logoColor=white)](${BASE}/BlackLock-v${VER}-win32.zip) | 32 位 Windows |"
            echo "| **ARM64** | [![exe arm64](https://img.shields.io/badge/exe-arm64-0078D6?style=flat-square&logo=windows&logoColor=white)](${BASE}/BlackLock-arm64.exe) [![zip arm64](https://img.shields.io/badge/zip-arm64-0078D6?style=flat-square&logo=windows&logoColor=white)](${BASE}/BlackLock-v${VER}-arm64.zip) | ARM 设备（Surface Pro X 等），原生运行 |"
            echo
            echo '`exe` 单文件下载即用；`zip` 内含默认 `config.ini`。默认快捷键 `Alt + L`，默认无需密码（回车或再按一次快捷键即可解锁）。'
            echo
            echo '## 更新内容'
            echo
            echo "详见 [CHANGELOG.md](https://github.com/${REPO}/blob/main/CHANGELOG.md)。"
          } > NOTES.md
          cat NOTES.md

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # 若 Release 已存在则改为更新说明并上传/覆盖附件
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "BlackLock $GITHUB_REF_NAME" --notes-file NOTES.md \
            artifacts/*/* \
          || { gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file NOTES.md; \
               gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" artifacts/*/* --clobber; }
